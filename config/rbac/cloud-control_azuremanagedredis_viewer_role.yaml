# permissions for end users to view azuremanagedredis.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: azuremanagedredis-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: cloud-manager
    app.kubernetes.io/part-of: cloud-manager
    app.kubernetes.io/managed-by: kustomize
  name: azuremanagedredis-viewer-role
rules:
- apiGroups:
  - cloud-control.kyma-project.io
  resources:
  - azuremanagedredis
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cloud-control.kyma-project.io
  resources:
  - azuremanagedredis/status
  verbs:
  - get
