name: SonarQube

on:
  workflow_run:
    workflows:
      - PR Test
    types:
      - completed

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Print details
        env:
          PR_DATA: ${{ toJSON(github.event.workflow_run.pull_requests) }}
        run: |
          echo "Workflow name:          ${{ github.event.workflow_run.name }}"
          PR=$(echo "$PR_DATA" | python3 -c "import sys,json; prs=json.load(sys.stdin); print(prs[0]['number'] if prs else 'N/A')")
          echo "Pull request:           ${PR}"
          echo "Head SHA:               ${{ github.event.workflow_run.head_sha }}"
          echo "Event name:             ${{ github.event.workflow_run.event }}"
          echo "Parent workflow result: ${{ github.event.workflow_run.conclusion }}"

      - name: Checkout repository
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0
          persist-credentials: false

      - name: Download coverage artifacts
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: coverage-*.out
          path: ./coverage

      - name: List coverage files
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        run: tree ./coverage || find ./coverage -type f

      - name: Collect coverage paths
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        id: coverage
        run: |
          paths=$(find ./coverage -name cover.out | tr '\n' ',' | sed 's/,$//')
          echo "Coverage paths: ${paths}"
          echo "paths=${paths}" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.go.coverage.reportPaths=${{ steps.coverage.outputs.paths }}
