name: PR Go Fix Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  go-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run go fix
        run: go fix ./...

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo ""
            echo "Error: 'go fix' produced changes. Please run 'go fix ./...' locally and commit the results."
            exit 1
          fi
