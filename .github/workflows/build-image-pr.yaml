name: Cloud-Manager Build Image PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths-ignore:
      - .github/workflows/stale.yaml
      - docs/**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    paths-ignore:
      - .github/workflows/stale.yaml
      - docs/**

jobs:
  approve-image-build:
    if: ${{ github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'pr-build-image') }}
    environment: e2e
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "Build approved"

  build-image:
    if: ${{ github.event_name == 'pull_request_target' }}
    permissions:
      id-token: write # This is required for requesting the JWT token
      contents: read # This is required for actions/checkout
    needs: approve-image-build
    uses: kyma-project/test-infra/.github/workflows/image-builder.yml@main # Usage: kyma-project/test-infra/.github/workflows/image-builder.yml@main
    with:
      name: cloud-manager
      dockerfile: Dockerfile
      export-tags: true

  local-build:
    name: Build Image Locally
    if: ${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'pr-build-image') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build Image Locally
        uses: docker/build-push-action@v7
        with:
          context: .
          outputs: type=cacheonly
          push: false
          tags: user/app:latest
