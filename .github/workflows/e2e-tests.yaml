name: E2E tests
run-name: E2E tests ${{ inputs.provider }}

# Required GitHub Repository Configuration:
#
# Secrets (Settings > Secrets and variables > Actions > Secrets):
#   GARDENER_KUBECONFIG          - Kubeconfig for Gardener cluster access (contains auth token)
#
# Variables (Settings > Secrets and variables > Actions > Variables):
#   OIDC_CLIENT_ID               - Gardener OIDC client identifier
#   OIDC_ISSUER_URL              - Gardener OIDC issuer endpoint (e.g., https://dex.canary.gardener.cloud.sap)

on:
  workflow_dispatch:
    inputs:
      provider:
        type: choice
        required: true
        options:
          - ''
          - aws
          - gcp
          - azure
          - openstack
        description: Cloud provider
      tags:
        type: string
        required: false
        description: |
          Godog tags (provider automatically appended)
      feature_flags:
        type: choice
        required: true
        options:
          - ./pkg/feature/ff_edge.yaml
          - ./pkg/feature/ff_ga.yaml
        description: Feature flag file
      debug:
        type: boolean
        description: Extra logs and prints
        default: false
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_NAME: CloudManagerRole
      AWS_PEERING_ROLE_NAME: CloudManagerPeeringRole
      DEBUG:  ${{ inputs.debug && 'true' || '' }}
      RUN_E2E_TESTS: 1
      CONFIG_DIR: ${{ github.workspace }}/tmp
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate required configuration
        shell: bash
        run: |
          MISSING=""
          [ -z "${{ vars.OIDC_CLIENT_ID }}" ] && MISSING="$MISSING OIDC_CLIENT_ID"
          [ -z "${{ vars.OIDC_ISSUER_URL }}" ] && MISSING="$MISSING OIDC_ISSUER_URL"
          [ -z "${{ secrets.GARDENER_KUBECONFIG }}" ] && MISSING="$MISSING GARDENER_KUBECONFIG"
          
          if [ -n "$MISSING" ]; then
            echo "::error::❌ Missing required configuration:$MISSING"
            echo "::error::Please configure these in Settings > Secrets and variables > Actions"
            echo "::error::See workflow comments for details"
            exit 1
          fi
          echo "✅ All required configuration variables are set"

      - name: Set provider env var
        run: |
          PROVIDER=${{ inputs.provider }}
          echo "PROVIDER=$PROVIDER" >> $GITHUB_ENV

      - name: Break if provider is empty
        if: ${{ env.PROVIDER == '' }}
        run: echo "PROVIDER is missing or empty!" && exit 1

      - name: Setup tags
        run: |
          TAGS="@$PROVIDER && ~@skip"
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS="${{ inputs.tags }} && $TAGS"
          fi
          echo "Running tests with tag: $TAGS"
          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Inputs OK
        run: |
          echo "INPUTSOK='true'" >> $GITHUB_ENV
          
          echo "# Runtime info :information_source:" >> $GITHUB_STEP_SUMMARY
          echo " * Provider: $PROVIDER" >> $GITHUB_STEP_SUMMARY
          echo " * Tags: $TAGS" >> $GITHUB_STEP_SUMMARY
          echo " * Debug: $DEBUG" >> $GITHUB_STEP_SUMMARY

      - name: Initialize E2E environment
        uses: ./.github/actions/e2e-init
        id: e2e-init
        with:
          gardener_kubeconfig: ${{ secrets.GARDENER_KUBECONFIG }}
          oidc_client_id: ${{ vars.OIDC_CLIENT_ID }}
          oidc_issuer_url: ${{ vars.OIDC_ISSUER_URL }}
          feature_flag_file: ${{ inputs.feature_flags || './pkg/feature/ff_edge.yaml' }}

      - name: Create shared instance
        env:
          KUBECONFIG: ./tmp/kubeconfig-kcp.yaml
        run: |
          go run ./e2e/cmd instance create -a shared-$PROVIDER -p $PROVIDER -t 30m -w -v

      - name: Add module to shared instance
        env:
          KUBECONFIG: ${{ github.workspace }}/tmp/kubeconfig-kcp.yaml
        run: |
          go run ./e2e/cmd instance modules add -m  cloud-manager -a shared-$PROVIDER
          sleep 10

      - name: run e2e tests
        env:
          KUBECONFIG: ${{ github.workspace }}/tmp/kubeconfig-kcp.yaml
        run: |
          GHERKIN_REPORT="${{ github.workspace }}/output.gherkin"
          if [ -n "$DEBUG" ]; then
            echo "$TAGS"
            echo "$KUBECONFIG"
            ls -la ./tmp
          fi
          go test ./e2e/tests -timeout 0 -v -race -godog.tags "$TAGS" -godog.format "pretty,pretty:$GHERKIN_REPORT"

          if [ -f "$GHERKIN_REPORT" ]; then
            echo '# Features' >> $GITHUB_STEP_SUMMARY
            echo '```gherkin' >> $GITHUB_STEP_SUMMARY
            cat $GHERKIN_REPORT | sed 's/\x1b\[[0-9;]*[mGKH]//g' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      # task "Cleaning extended API groups" failed: 1 error occurred:
      #  * retry failed with context deadline exceeded, last error: remaining objects are still present:
      # *v1.CustomResourceDefinition /cloudresources.cloud-resources.kyma-project.io
      # *v1.CustomResourceDefinition /ipranges.cloud-resources.kyma-project.io
      # *v1.CustomResourceDefinition /kymas.operator.kyma-project.io

      - name: Clean up orphaned SKR resources
        if: always() && env.INPUTSOK != ''
        env:
          KUBECONFIG: ${{ github.workspace }}/tmp/kubeconfig-kcp.yaml
        run: |
          if [ -f "$KUBECONFIG" ]; then
            go run ./e2e/cmd instance clean -a shared-$PROVIDER -v
            # give time to CM to pick-up and start deletion
            sleep 30
          fi

      - name: Delete shared instance
        if: always() && env.INPUTSOK != ''
        env:
          KUBECONFIG: ./tmp/kubeconfig-kcp.yaml
        run: |
          if [ -f "$KUBECONFIG" ]; then
            go run ./e2e/cmd instance delete -a shared-$PROVIDER -t 60m -w -v
            # give time to sim to pick-up and delete shoot
            sleep 10
          fi

      - name: Destroy E2E environment
        if: always() && env.INPUTSOK != ''
        uses: ./.github/actions/e2e-destroy
        id: e2e-destroy
