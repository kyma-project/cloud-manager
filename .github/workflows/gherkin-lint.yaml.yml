name: gherkin-lint.yaml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

jobs:
  gherkin-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: NPM install
        shell: bash
        run: |
          npm install -g gherkin-lint

      - name: Gherkin lint
        shell: bash
        run: |
          gherkin-lint --rulesdir e2e/features
