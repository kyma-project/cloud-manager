name: E2E Destroy Action
description: Destroys the environment after E2E tests
inputs:
  # If multiple actions run in the same workflow they MUST produce logs with different name
  # Otherwise error is
  # Failed request: (409) Conflict: an artifact with this name already exists on the workflow run
  logs-suffix:
    required: true
    description: Log name suffix
runs:
  using: composite
  steps:
    - name: Stop Cloud Manager
      shell: bash
      if: always()
      run: |
        if [ -n "$CLOUD_MANAGER_PID" ]; then
          echo "Killing Cloud Manager with PID $CLOUD_MANAGER_PID"
          kill $CLOUD_MANAGER_PID || true
        else
          echo "CLOUD_MANAGER_PID not set, skipping"
        fi

    - name: Stop sim
      shell: bash
      if: always()
      run: |
        if [ -n "$SIM_PID" ]; then
          echo "Killing sim with PID $SIM_PID"
          kill $SIM_PID || true
        else
          echo "SIM_PID not set, skipping"
        fi

    - name: Stop envtest
      shell: bash
      if: always()
      run: |
        if [ -n "$ENVTEST_PID" ]; then
          echo "Killing envtest with PID $ENVTEST_PID"
          kill $ENVTEST_PID || true
        else
          echo "ENVTEST_PID not set, skipping"
        fi

    - name: Upload logs
      uses: actions/upload-artifact@v6
      with:
        name: logs-${{ inputs.logs-suffix }}
        path: |
          tmp/envtest.log
          tmp/sim.log
          tmp/cloud-manager.log

    - name: Delete tmp directory
      shell: bash
      if: always()
      run: rm -rf ./tmp
